    <style>
      body { margin: 0; overflow-x: hidden; background-color: #FAF9F6; } /* Off-white background */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #FAF9F6; }
      ::-webkit-scrollbar-thumb { background: #fda4af; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #E63946; }
      
      .animate-fade-in { animation: fadeIn 0.5s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .animate-scale-in { animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

      /* Energy-drink / Brutalist playful styles */
      .shadow-brutal-black {
        box-shadow: 6px 6px 0px 0px rgba(15, 23, 42, 1);
        border: 2px solid rgba(15, 23, 42, 1);
      }
      .shadow-brutal-brand {
        box-shadow: 6px 6px 0px 0px #E63946;
        border: 2px solid rgba(15, 23, 42, 1);
      }
      .shadow-brutal-white {
        box-shadow: 4px 4px 0px 0px #ffffff;
        border: 2px solid rgba(15, 23, 42, 1);
      }
      .shadow-brutal-pink {
        box-shadow: 6px 6px 0px 0px #fda4af;
        border: 2px solid rgba(15, 23, 42, 1);
      }
      .shadow-brutal-blue {
        box-shadow: 6px 6px 0px 0px #60a5fa;
        border: 2px solid rgba(15, 23, 42, 1);
      }
      .shadow-brutal-green {
        box-shadow: 6px 6px 0px 0px #4ade80;
        border: 2px solid rgba(15, 23, 42, 1);
      }
      .shadow-brutal-purple {
        box-shadow: 6px 6px 0px 0px #c084fc;
        border: 2px solid rgba(15, 23, 42, 1);
      }

      /* Float animations */
      @keyframes floatSlow {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(3deg); }
      }
      @keyframes floatSlowReverse {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-12px) rotate(-3deg); }
      }
      .animate-float-slow {
        animation: floatSlow 6s ease-in-out infinite;
      }
      .animate-float-slow-reverse {
        animation: floatSlowReverse 7s ease-in-out infinite;
      }

      @keyframes pulseGlow {
        0%, 100% { filter: drop-shadow(0 0 15px rgba(230, 57, 70, 0.4)); }
        50% { filter: drop-shadow(0 0 30px rgba(230, 57, 70, 0.8)); }
      }
      .animate-pulse-glow {
        animation: pulseGlow 4s infinite;
      }
    </style>
